<!DOCTYPE html>
<html lang="ca">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Web</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Inter:wght@300;400;600&display=swap');

    :root {
      --accent: #6a4cff;
      --accent-dark: #3d1fc7;
      --bg-dark: #0a0a0f;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    .boto1 {
      background: linear-gradient(135deg, #1a1a2e, #6a4cff);
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(106,76,255,0.3);
      transition: transform 0.15s, box-shadow 0.15s, background 0.2s;
    }
    .boto1:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(106,76,255,0.5);
      background: linear-gradient(135deg, #6a4cff, #1a1a2e);
    }

    .fons {
      background: linear-gradient(135deg, #0a0a0f 0%, #1a0a3f 50%, #0a0a0f 100%);
      color: white;
      min-height: 100vh;
      padding: 24px;
      font-family: 'Inter', sans-serif;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(106,76,255,0.2);
      border-radius: 14px;
      backdrop-filter: blur(10px);
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .nav-logo { height: 52px; border-radius: 8px; }
    .nav-links { display: flex; gap: 8px; flex: 1; flex-wrap: wrap; }
    .nav-links button { font-size: 14px; padding: 8px 14px; }
    .search-area { display: flex; gap: 6px; align-items: center; }
    .search-area input {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(106,76,255,0.3);
      color: white;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      width: 200px;
      transition: border-color 0.2s, width 0.3s;
    }
    .search-area input:focus { border-color: #6a4cff; width: 260px; }
    .search-area input::placeholder { color: rgba(255,255,255,0.4); }
    .warranty-badge {
      background: linear-gradient(135deg, #1a3a1a, #2d7a2d);
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 13px;
      border: 1px solid rgba(60,200,60,0.3);
      white-space: nowrap;
    }

    /* TOAST */
    #toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: rgba(106,76,255,0.95);
      color: white;
      padding: 12px 22px;
      border-radius: 10px;
      font-size: 14px;
      box-shadow: 0 4px 20px rgba(106,76,255,0.5);
      transform: translateY(80px);
      opacity: 0;
      transition: transform 0.3s ease, opacity 0.3s ease;
      z-index: 9999;
    }
    #toast.show { transform: translateY(0); opacity: 1; }

    /* CART */
    .cart-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      background: linear-gradient(135deg, #6a4cff, #3d1fc7);
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 50px;
      font-size: 15px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(106,76,255,0.5);
      z-index: 1000;
      transition: transform 0.2s;
    }
    .cart-btn:hover { transform: scale(1.06); }
    .cart-count {
      background: #ff4c6a;
      border-radius: 50%;
      padding: 1px 6px;
      font-size: 12px;
      font-weight: 700;
      margin-left: 6px;
    }

    /* CART PANEL */
    .cart-panel {
      position: fixed;
      top: 0; right: -380px;
      width: 360px;
      height: 100vh;
      background: #12121f;
      border-left: 1px solid rgba(106,76,255,0.3);
      z-index: 2000;
      padding: 24px;
      transition: right 0.35s cubic-bezier(0.4,0,0.2,1);
      overflow-y: auto;
    }
    .cart-panel.open { right: 0; }
    .cart-panel h2 { font-family: 'Rajdhani', sans-serif; font-size: 22px; margin-bottom: 18px; color: #a08bff; }
    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 10px;
      font-size: 14px;
      gap: 8px;
    }
    .cart-item button {
      background: #ff4c6a;
      border: none;
      color: white;
      border-radius: 6px;
      padding: 4px 8px;
      cursor: pointer;
      font-size: 12px;
    }
    .cart-total {
      margin-top: 16px;
      font-size: 16px;
      font-weight: 600;
      color: #a08bff;
      border-top: 1px solid rgba(255,255,255,0.1);
      padding-top: 14px;
    }
    .cart-checkout {
      margin-top: 14px;
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #6a4cff, #3d1fc7);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .cart-checkout:hover { opacity: 0.85; }
    .close-cart {
      float: right;
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.5);
      font-size: 22px;
      cursor: pointer;
      line-height: 1;
    }
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 1999;
    }
    .overlay.visible { display: block; }

    /* PRODUCTS */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 20px;
      margin-top: 10px;
    }
    .product-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(106,76,255,0.2);
      border-radius: 14px;
      padding: 20px;
      text-align: center;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      animation: fadeIn 0.4s ease both;
    }
    .product-card:hover {
      transform: translateY(-5px);
      border-color: rgba(106,76,255,0.6);
      box-shadow: 0 8px 30px rgba(106,76,255,0.2);
    }
    .product-card img {
      width: 140px;
      height: 130px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .product-card h3 { font-size: 15px; margin-bottom: 6px; font-family: 'Rajdhani', sans-serif; font-size: 17px; }
    .product-price { color: #a08bff; font-weight: 700; font-size: 17px; margin-bottom: 6px; }
    .stars { color: gold; font-size: 14px; margin-bottom: 10px; }
    .btn-add {
      background: linear-gradient(135deg, #6a4cff, #3d1fc7);
      color: white;
      border: none;
      padding: 9px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      width: 100%;
      transition: opacity 0.2s;
    }
    .btn-add:hover { opacity: 0.85; }

    /* SEARCH FILTER */
    .no-results { text-align: center; color: rgba(255,255,255,0.4); padding: 40px; font-size: 16px; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* MODAL */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 3000;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #12121f;
      border: 1px solid rgba(106,76,255,0.4);
      border-radius: 16px;
      padding: 30px;
      max-width: 420px;
      width: 90%;
      text-align: center;
      animation: fadeIn 0.3s ease;
    }
    .modal img { width: 160px; border-radius: 10px; margin-bottom: 14px; }
    .modal h2 { font-family: 'Rajdhani', sans-serif; font-size: 22px; margin-bottom: 8px; }
    .modal p { color: rgba(255,255,255,0.6); font-size: 14px; margin-bottom: 14px; }
    .modal-price { color: #a08bff; font-size: 20px; font-weight: 700; margin-bottom: 16px; }
    .modal-close { background: transparent; border: none; color: rgba(255,255,255,0.4); font-size: 20px; cursor: pointer; float: right; }
  </style>
</head>
<body class="fons">

<!-- Cart button -->
<button class="cart-btn" onclick="toggleCart()">🛒 Cistella <span class="cart-count" id="cart-count">0</span></button>

<!-- Overlay -->
<div class="overlay" id="overlay" onclick="toggleCart()"></div>

<!-- Cart panel -->
<div class="cart-panel" id="cart-panel">
  <button class="close-cart" onclick="toggleCart()">✕</button>
  <h2>🛒 La teva cistella</h2>
  <div id="cart-items"></div>
  <div class="cart-total" id="cart-total"></div>
  <button class="cart-checkout" onclick="checkout()">✓ Finalitzar comanda</button>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Product detail modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <img id="modal-img" src="" alt="">
    <h2 id="modal-name"></h2>
    <p id="modal-desc"></p>
    <div class="modal-price" id="modal-price"></div>
    <div class="stars" id="modal-stars"></div>
    <button class="btn-add" onclick="addFromModal()">+ Afegir a la cistella</button>
  </div>
</div>

<!-- NAV -->
<div class="navbar">
  <img class="nav-logo" src="https://cdn-icons-png.flaticon.com/256/3144/3144456.png" alt="logo">
  <div class="nav-links">
    <button class="boto1" onclick="showToast('Benvingut a Inici!')">ㅤIniciㅤ</button>
    <button class="boto1" onclick="filterSection('all')">ㅤProductesㅤ</button>
    <button class="boto1" onclick="showToast('Ens pots escriure a ajuda@web.cat')">Ajuda</button>
    <button class="boto1" onclick="showToast('Som un equip apassionat per l\'esport!')">Nosaltres</button>
    <button class="boto1" onclick="showToast('Segueix-nos a Instagram i TikTok!')">Xarxes</button>
  </div>
  <div class="search-area">
    <input type="text" id="search-input" placeholder="Cerca productes..." oninput="filterProducts()">
    <button class="boto1" onclick="filterProducts()">🔍</button>
  </div>
  <div class="warranty-badge">✅ Garantia de 2 anys</div>
</div>

<!-- Sort controls -->
<div style="display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; align-items:center;">
  <span style="color:rgba(255,255,255,0.5); font-size:14px;">Ordenar per:</span>
  <button class="boto1" style="font-size:13px; padding:7px 12px;" onclick="sortProducts('price-asc')">Preu ↑</button>
  <button class="boto1" style="font-size:13px; padding:7px 12px;" onclick="sortProducts('price-desc')">Preu ↓</button>
  <button class="boto1" style="font-size:13px; padding:7px 12px;" onclick="sortProducts('name')">Nom A-Z</button>
  <button class="boto1" style="font-size:13px; padding:7px 12px;" onclick="sortProducts('rating')">Valoració ⭐</button>
  <span id="results-count" style="color:rgba(255,255,255,0.4); font-size:13px; margin-left:auto;"></span>
</div>

<!-- Products grid -->
<div class="products-grid" id="products-grid"></div>

<script>
  const products = [
    { id:1, name:"Barra Olímpica 20kg", price:129.9, rating:4, img:"https://vioksport.es/wp-content/uploads/2020/08/barra-olimpica-20kg.jpg", desc:"Barra olímpica d'alta qualitat, ideal per a powerlifting i halterofília. Capacitat de 680 kg." },
    { id:2, name:"Banc Ajustable Multifunció", price:249.9, rating:4, img:"https://www.titaniumstrength.es/media/catalog/product/cache/091edd3dd24f94ee9e594de8bb6fb808/t/i/titanium-strength-heavy-duty-adjustable-bench.jpg", desc:"Banc regulable amb múltiples posicions, estructura d'acer reforçat. Fins a 300 kg de càrrega." },
    { id:3, name:"Mancuernes 10kg (parell)", price:39.9, rating:5, img:"https://cdn-icons-png.flaticon.com/512/3043/3043155.png", desc:"Mancuernes de goma antilliscant, perfectes per a entrenament en casa o gimnàs." },
    { id:4, name:"Corda de saltar Pro", price:14.9, rating:4, img:"https://cdn-icons-png.flaticon.com/512/2964/2964514.png", desc:"Corda d'alumini amb coixinets de rodaments per a velocitat màxima. Longitud ajustable." },
    { id:5, name:"Guants d'Entrenament", price:22.5, rating:3, img:"https://cdn-icons-png.flaticon.com/512/1048/1048953.png", desc:"Guants de cuir sintètic amb suport de canell integrat. Talla M/L/XL." },
    { id:6, name:"Kettlebell 16kg", price:44.9, rating:5, img:"https://cdn-icons-png.flaticon.com/512/2382/2382533.png", desc:"Kettlebell de ferro fos amb base plana antilliscant. Excel·lent per a circuits funcionals." },
  ];

  let cart = [];
  let currentSort = 'default';
  let modalProduct = null;

  function starsHTML(r) {
    return '★'.repeat(r) + '☆'.repeat(5 - r);
  }

  function renderProducts(list) {
    const grid = document.getElementById('products-grid');
    document.getElementById('results-count').textContent = list.length + ' producte' + (list.length !== 1 ? 's' : '');
    if (!list.length) {
      grid.innerHTML = '<div class="no-results">Cap producte trobat 😕</div>';
      return;
    }
    grid.innerHTML = list.map((p, i) => `
      <div class="product-card" style="animation-delay:${i * 0.07}s">
        <img src="${p.img}" alt="${p.name}" onclick="openModal(${p.id})" style="cursor:pointer">
        <h3>${p.name}</h3>
        <div class="stars">${starsHTML(p.rating)}</div>
        <div class="product-price">${p.price.toFixed(2)}€</div>
        <button class="btn-add" onclick="addToCart(${p.id})">🛒 Afegir a la cistella</button>
      </div>
    `).join('');
  }

  function filterProducts() {
    const q = document.getElementById('search-input').value.toLowerCase().trim();
    let list = q ? products.filter(p => p.name.toLowerCase().includes(q)) : [...products];
    applySort(list);
  }

  function sortProducts(method) {
    currentSort = method;
    filterProducts();
  }

  function applySort(list) {
    if (currentSort === 'price-asc') list.sort((a,b) => a.price - b.price);
    else if (currentSort === 'price-desc') list.sort((a,b) => b.price - a.price);
    else if (currentSort === 'name') list.sort((a,b) => a.name.localeCompare(b.name));
    else if (currentSort === 'rating') list.sort((a,b) => b.rating - a.rating);
    renderProducts(list);
  }

  function addToCart(id) {
    const p = products.find(x => x.id === id);
    const existing = cart.find(x => x.id === id);
    if (existing) existing.qty++;
    else cart.push({ ...p, qty: 1 });
    updateCartUI();
    showToast(`✅ ${p.name} afegit!`);
    // bounce animation on cart button
    const btn = document.querySelector('.cart-btn');
    btn.style.transform = 'scale(1.2)';
    setTimeout(() => btn.style.transform = '', 200);
  }

  function removeFromCart(id) {
    cart = cart.filter(x => x.id !== id);
    updateCartUI();
  }

  function updateCartUI() {
    const total = cart.reduce((s, x) => s + x.price * x.qty, 0);
    const count = cart.reduce((s, x) => s + x.qty, 0);
    document.getElementById('cart-count').textContent = count;
    document.getElementById('cart-items').innerHTML = cart.length
      ? cart.map(x => `
          <div class="cart-item">
            <span>${x.name} ×${x.qty}</span>
            <span>${(x.price * x.qty).toFixed(2)}€</span>
            <button onclick="removeFromCart(${x.id})">✕</button>
          </div>`).join('')
      : '<p style="color:rgba(255,255,255,0.4);font-size:14px">La cistella és buida.</p>';
    document.getElementById('cart-total').innerHTML = cart.length
      ? `Total: <strong>${total.toFixed(2)}€</strong>` : '';
  }

  function toggleCart() {
    document.getElementById('cart-panel').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('visible');
  }

  function checkout() {
    if (!cart.length) { showToast('⚠️ La cistella és buida!'); return; }
    cart = [];
    updateCartUI();
    toggleCart();
    showToast('🎉 Comanda realitzada amb èxit! Gràcies!');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(window._toastTimer);
    window._toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
  }

  function openModal(id) {
    modalProduct = products.find(x => x.id === id);
    document.getElementById('modal-img').src = modalProduct.img;
    document.getElementById('modal-name').textContent = modalProduct.name;
    document.getElementById('modal-desc').textContent = modalProduct.desc;
    document.getElementById('modal-price').textContent = modalProduct.price.toFixed(2) + '€';
    document.getElementById('modal-stars').innerHTML = starsHTML(modalProduct.rating);
    document.getElementById('modal-overlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    modalProduct = null;
  }

  function addFromModal() {
    if (modalProduct) { addToCart(modalProduct.id); closeModal(); }
  }

  // Close modal on overlay click
  document.getElementById('modal-overlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
  renderProducts(products);
  updateCartUI();
</script>
</body>
</html>
